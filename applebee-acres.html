<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">

<style>
  html,body{margin:0;height:100%;background:#0a0c16;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh;height:100dvh;object-fit:contain;image-rendering:pixelated;image-rendering:crisp-edges;touch-action:manipulation}

<body>
<canvas id="s" width="384" height="216"></canvas>
<div class="ui" id="hud"></div>
<div class="ui" id="hint">space pause · 1-4 season · − / = speed · L live · h hide<br>click the field to plant a sunflower</div>
<script>
(()=>{ 'use strict';
// World width follows the viewport aspect (dual monitors → one wide farm).
const AR=(typeof innerWidth==='number'&&innerWidth>0&&innerHeight>0)?innerWidth/innerHeight:16/9;
const W=Math.max(384,Math.min(1152,Math.round(216*AR)));
const H=216,HOR=118,TAU=Math.PI*2,LX=W/384;
const AX=x=>Math.round(x*LX); // landmark anchor scaler
const cv=document.getElementById('s'),g=cv.getContext('2d');
const SS=2; // 2× internal render: smoother motion & curves, same pixel-art look
cv.width=W*SS;cv.height=H*SS;
g.scale(SS,SS);
const hud=document.getElementById('hud');
if(typeof location!=='undefined'&&(location.host==='acres.local'||location.protocol==='file:'||location.protocol==='about:'||/saver/.test(location.search)))
  document.getElementById('hint').style.display='none'; // screensaver hosts drop the key help; the clock HUD stays

// ---------- location (edit these to move the farm) ----------
const LOC={lat:37.04,lon:-100.92,label:'Liberal, Kansas'};

// ---------- color utils ----------
const CC={};
const C=h=>CC[h]||(CC[h]=[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]);
const mixA=(a,b,t)=>[a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t];
const css=a=>`rgb(${a[0]|0},${a[1]|0},${a[2]|0})`;
const clamp=(v,a,z)=>v<a?a:v>z?z:v, lerp=(a,b,t)=>a+(b-a)*t;
const NIGHT=C('#121833'), SNOW=C('#e6ebf4'), GOLD=C('#ffb066');
let ghK=0; // golden-hour grade strength — peaks mid sunrise/sunset, 0 in full day & deep night

// ---------- seasonal palette ----------
const PAL={
  soil:    ['#7c5c42','#6f5039','#6a4a34','#7a6a58'],
  verge:   ['#7fae55','#77a84e','#b08a48','#9aa4b2'],
  hillFar: ['#93b47c','#86ab6c','#b39366','#c6cdda'],
  hillNear:['#71975e','#699257','#997440','#aab4c4'],
  tree:    ['#82b45e','#4f8c45','#c46f33','#e8edf4'],
  crop:    ['#8cc264','#57a04b','#d8ae45','#9aa4b5'],
};
const SKY=[ // [tod, top, mid, bottom]
  [0.00,'#0a0e26','#10173a','#1a2148'],
  [0.19,'#0d1330','#1b2148','#3a3060'],
  [0.26,'#2c3a6e','#8a5a74','#e8955f'],
  [0.34,'#4d7cb0','#7fa8d4','#f4c98a'],
  [0.50,'#4f86c4','#84b4de','#c8e2ee'],
  [0.66,'#4a79b4','#82a8d2','#e8c084'],
  [0.75,'#3b4884','#a06078','#f09a58'],
  [0.83,'#171d44','#2c2a58','#584070'],
  [1.00,'#0a0e26','#10173a','#1a2148'],
];
const SEASONS=['Spring','Summer','Autumn','Winter'];
const CROPK=[ // yearly rotation: corn, wheat, milo
  {col:'#57a04b',hm:1.0, head:'#ecd784'},
  {col:'#d9b95c',hm:0.72,head:'#efe0a0'},
  {col:'#6f9c4a',hm:0.88,head:'#a8402e'},
];

// ---------- time & mode ----------
const DAYLEN=90, SPD=[0.5,1,2,4,8,16];
let live=true, wx=null, liveDate=new Date();
let spi=2, paused=false, time=0.22*DAYLEN, rt=0;
let day=0,tod=0,seasonIdx=0,seasonT=0,year=1,dl=1;
let lastDay=0,lastSeason=0,lastDateStr='';
let weather=0,rainyDay=false,rainS=0,rainE=0,snowCover=0,flashT=0,wind=6;
let mAng=0,wheelAng=0,chimT=0,puffT=0;
let fire=null,fireRolled=-1,fireAt=0.55,art=null,duster=null,devil=null,tumbles=[],spray=[],rainbowT=0,prevW=0,cropKind=0;
let train=null,trainAt=[],sale=null,saleAt=-1,lotStock=2,balloon=null,jet=null,deer=null,deerAt=-1,snowman=null,ufo=null,fw=[],fwNext=0,fwDemo=0,fogT=0,holiday=false,townN=1,townProg=0;
let rabbit=null,rabbitAt=-1; // a cottontail out on the verge at first light
let hawk=null,hawkAt=-1;     // a red-tail rides a thermal over the field on clear days (mutually exclusive with aircraft — never shares the sky)
let pheasant=null,pheasantAt=-1; // a rooster pheasant works the field edge, flushes when the dog/traffic comes near
let cattle=null,cattleAt=-1; // a small herd grazes the STUBBLE field (autumn/winter) and drifts across; spooks off if a machine works the field
const EPOCH=new Date(2026,6,6).getTime(); // town founding week
// the data-center fight: surveyed, protested, and beaten (days since EPOCH)
const SAGA={survey:[45,75],signs:[70,340],protests:[80,152,290],won:330};
let epDay=0,protest=null,sagaSurvey=false,sagaStakes=false,sagaSigns=false;
let strange={},satS=null,rocketS=null,meteors=[],showerT=0,auroraT=0,auroraInt=0,eclDemo=0,eclipseK=0;
let asteroid=null,crater=null,debris=[],paceT=240+Math.random()*240;
let duckHunt=null,mouseX=-1,mouseY=-1,spaceHeld=false,spaceChord=false,huntAt=-1;   // duck hunt: rolled AMBIENT version (hunter auto-shoots, plays anywhere incl. the savers) + click/Space+D interactive version (browser only)
let netOff=false,netFireOn=false,netFireK=0,netDemo=false,netProbeBusy=false,netFailN=0,isSaver=false; // whole-network/internet-down watch → Keating catches fire (savers only; demo key 'k' forces it anywhere). LIVE system status, so deliberately NOT reset per season/day.
let dayFrac=0.5,noonTod=0.545,srT=0.27,ssT=0.82,yF=0,YRS=0,bus=null,busDay='';
let combine=null,sprayer=null,sprayRow=0,unld=null,autoNight=false,sprayerDue=false;
let vfwLot=[],halfMast=false,memDay=false;
let vfwNotes=[],vfwParty=0,vfwNoteT=0; // the party at the post: music notes drift out + blue/red/purple light builds into the night, keyed off how many patrons are inside
let partsT=null,partsAt=-1,haulers=[],haulTimes=[];
let empCars=[],visitors=[],visPlan=[],plane=null,planeOps=[];
// family & dealership personality wave
let barnO=0, bayO=0;                        // sliding barn door & roll-up bay door, eased 0..1
let famCar=null, famAt=-1, famAct='none', k2At=-1;   // family town trip + which afternoon activity; kid2's dandelion moment
let yardPlay=null, ball=null;               // picnic + game of catch
let bikeRide=null;                          // Wade's bike (practice when YRS<2, ride-to-store when YRS>=2)
let svcDrop=null, svcAt=-1;                 // a farmer drops a tractor at the bay for service
let bayOut=null, bayAt=-1;                  // mechanic pulls a repaired tractor out onto the apron & back
let weld=null, weldAt=-1;                   // Manny welds a repair at the bay bench (spark shower + arc glow)
let dropTimes=[];                           // semi trade-in DELIVERIES (arrive loaded, leave empty)
let tourCust=null;                          // the customer Hal is escorting around the lot right now
let cropWalk=false;                         // Earl's midday headland walk down the field
// per-machine seed: every display gets its own private schedule of strange sights
function hashStr(s2){let h=2166136261;for(let i=0;i<s2.length;i++){h^=s2.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
let SEED=0;
try{SEED=+localStorage.acresSeed||0;if(!SEED){SEED=(Math.random()*4294967295)>>>0;localStorage.acresSeed=SEED;}}
catch(e2){SEED=(Math.random()*4294967295)>>>0;}
function dayRng(tag){
  let s2=(SEED^hashStr(tag+'|'+(live?liveDate.toDateString():Math.floor(day))))>>>0;
  return()=>{s2^=s2<<13;s2>>>=0;s2^=s2>>>17;s2^=s2<<5;s2>>>=0;return s2/4294967296;};
}
function planStrange(){
  const r=dayRng('strange');
  strange={};
  if(r()<0.35)strange.sat={at:0.86+r()*0.1,dir:r()<0.5?1:-1,y:8+r()*30};
  if(r()<0.12){const sx3=r()<0.5?0.12:0.88;strange.rocket={at:0.8+r()*0.1,sx:sx3,dir:sx3<0.5?1:-1};}
  if(r()<0.09)strange.shower={from:0.88+r()*0.08};
  if(r()<0.08)strange.aurora={from:0.86+r()*0.06,dur:0.08+r()*0.06};
  if(r()<0.05)strange.comet={x:0.15+r()*0.7,y:0.08+r()*0.2,side:r()<0.5?1:-1};
  if(r()<0.05)strange.circle={cx:0.2+r()*0.6,row:1+((r()*2)|0),r:4+((r()*3)|0)};
  if(r()<0.03)strange.blood=true;
  if(r()<0.02)strange.eclipse={at:0.45+r()*0.15};
  // real meteor-shower calendar: guaranteed shows on the actual nights
  if(live){
    const showers=[[0,3],[3,22],[4,6],[7,12],[9,21],[10,17],[11,13]];
    for(const s3 of showers)
      if(liveDate.getMonth()===s3[0]&&Math.abs(liveDate.getDate()-s3[1])<=1)
        strange.shower={from:0.9+dayRng('sh')()*0.05};
  }
}
function applyCircle(sp){
  const row=cells[sp.row],c0=Math.floor(sp.cx*COLX.length);
  for(let i=Math.max(0,c0-sp.r);i<=Math.min(COLX.length-1,c0+sp.r);i++){
    if(i===c0)continue;
    const cl2=row[i];
    if((cl2.t==='crop'||cl2.t==='sunflower')&&cl2.g>0.25)cl2.t='flat';
  }
}
function applyCrater(ci,row){
  crater={x:COLX[Math.max(0,Math.min(COLX.length-1,ci))],row,age:0};
  for(let rI=Math.max(0,row-1);rI<=Math.min(ROWS-1,row+1);rI++){
    const rad=rI===row?5:3;
    for(let i=Math.max(0,ci-rad);i<=Math.min(COLX.length-1,ci+rad);i++){
      const cl3=cells[rI][i];
      if(cl3.t!=='none')cl3.t='burnt';
    }
  }
}
function startAsteroid(cb){
  const row=1+(Math.random()*2|0);
  const ci=8+Math.floor(Math.random()*Math.max(1,COLX.length-16));
  asteroid={t:0,ci,row,tx:COLX[ci],ty:ROWY[row]-2,cb,impact:false};
  try{localStorage.acresCrater=(live?liveDate.toDateString():'sim'+Math.floor(day))+'|'+ci+'|'+row;}catch(e3){}
}
// ---- duck hunt: a passer-by shoulders a shotgun, you get five shells, then he ambles off ----
function startDuckHunt(auto){
  const dir=Math.random()<0.5?1:-1;
  // ambient hunter stands out at the field edge (varied spot, here-and-there); interactive one waits near the lot
  const tx=auto?Math.round(W*(dir>0?0.18+Math.random()*0.22:0.6+Math.random()*0.22))
              :(dir>0?Math.round(W*0.32):Math.round(W*0.68));
  duckHunt={ph:'in',dir,x:dir>0?-12:W+12,tx,y:auto?130:126,
    shots:5,bag:0,flash:0,t:0,spawnT:0.7,aimx:0,aimy:HOR-30,ducks:[],auto:!!auto,fireT:1.6+Math.random(),
    cap:['#c8641c','#8a2f2a','#3a5a3a','#7a5a2a'][Math.random()*4|0]};
}
function shootDuck(mx,my){
  const D=duckHunt; if(!D||D.ph==='out')return;
  if(D.auto){D.auto=false;D.shots=Math.max(D.shots,5);D.t=Math.min(D.t,10);} // a human click takes the gun from the ambient hunter — fresh shells, the shell pips wake, the hunt is yours (Lively wallpaper forwards clicks, so this plays on the desktop)
  if(D.shots<=0)return;
  D.shots--; D.flash=0.15; D.aimx=mx; D.aimy=my; D.dir=mx>D.x?1:-1;
  for(const k of D.ducks){
    if(k.alive&&Math.hypot(k.x-mx,k.y-my)<9){k.alive=false;k.fall=0.01;D.bag++;
      for(let i=0;i<5;i++)smoke.push({x:k.x,y:k.y,vx:(Math.random()-0.5)*11,vy:-3-Math.random()*6,life:0.45+Math.random()*0.3,max:0.7,c:'#e8e0d0'});
      break;}
  }
}
function drawDuck(k){
  const x=k.x,y=k.y,D=k.dir;
  if(k.fall>0){ // tumbling out of the sky
    g.fillStyle=S('#33333c',0.62);g.fillRect(x-1.5,y,3,2);g.fillRect(x+(D>0?1:-1.5),y-1,1.5,1);
    g.fillStyle=S('#c8641c',0.6);g.fillRect(x-1.5,y+((rt*22|0)%2),3,0.6);return;
  }
  const up=Math.sin(rt*13+k.ph)>0;
  g.fillStyle=S('#33333c',0.62);
  g.fillRect(x-2,y,4,1.8); g.fillRect(x+D*2,y-0.6,1.6,1.4);
  g.fillStyle=S('#e0a020',0.6);g.fillRect(x+D*3.3,y+0.1,1,0.8);
  g.fillStyle=S('#33333c',0.62);
  if(up){g.fillRect(x-2.6,y-2,2.3,1);g.fillRect(x+0.3,y-2,2.3,1);}
  else{g.fillRect(x-2.6,y+1.6,2.3,1);g.fillRect(x+0.3,y+1.6,2.3,1);}
}
function drawHunter(D){
  const x=D.x,y=D.y||126,dir=D.dir,aim=D.ph!=='out';
  shadow(x+0.5,y,2.2);
  g.fillStyle=S('#3a4230',0.55);g.fillRect(x-1,y-3,1,3);g.fillRect(x+1,y-3,1,3);
  g.fillStyle=S('#c8641c',0.58);g.fillRect(x-1,y-6,3,3);                     // blaze-orange vest
  g.fillStyle=S('#8a4a1a',0.6);g.fillRect(x-1,y-6,3,1);
  g.fillStyle=S('#c9a985',0.52);g.fillRect(x-0.5,y-8,2,2);
  g.fillStyle=S(D.cap,0.58);g.fillRect(x-0.7,y-8.8,2.4,1);g.fillRect(x+(dir>0?1.5:-1.5),y-8.4,1,0.7);
  let gx,gy;
  g.strokeStyle=S('#5a4632',0.65);g.lineWidth=1;g.beginPath();
  if(aim){const a=Math.atan2(D.aimy-(y-6),D.aimx-x);gx=x+Math.cos(a)*6;gy=(y-6)+Math.sin(a)*6;g.moveTo(x+dir*0.5,y-6);g.lineTo(gx,gy);}
  else{gx=x+dir*4;gy=y-4.5;g.moveTo(x,y-5);g.lineTo(gx,gy);}
  g.stroke();
  if(D.flash>0){g.fillStyle=`rgba(255,225,140,${Math.min(0.9,D.flash*6)})`;circle(gx,gy,1.8,`rgba(255,225,140,${Math.min(0.9,D.flash*6)})`);
    g.fillStyle='#fff';g.fillRect(gx-0.5,gy-0.5,1,1);}
  if(!D.auto)for(let i=0;i<5;i++){g.fillStyle=i<D.shots?'#e8b13c':S('#4a4030',0.6);g.fillRect(x-4+i*2,y-12,1,2.2); // shell pips only in the interactive game — the ambient one stays clean
    if(i<D.shots){g.fillStyle='#c04a2a';g.fillRect(x-4+i*2,y-12,1,0.7);}}
  for(let i=0;i<Math.min(D.bag,5);i++){g.fillStyle=S('#33333c',0.6);g.fillRect(x-3+i*2,y-0.5,1.6,1);}
}
function nudge(){ // guaranteed low-key liveliness while the saver runs
  const opts=[];
  if(!train)opts.push(()=>{const n=8+(Math.random()*7|0),d2=Math.random()<0.5?1:-1;
    train={x:d2>0?-(16+n*10):W+16+n*10,dir:d2,n};});
  if(dl>0.5)opts.push(()=>spawnFlock(Math.random()<0.5?1:-1));
  if(tumbles.length<2)opts.push(()=>tumbles.push({x:-8,y:H-16-Math.random()*46,a:0,r:2.2+Math.random()*1.4}));
  if(!jet&&!hawk)opts.push(()=>{jet={x:Math.random()<0.5?-10:W+10,dir:0,y:8+Math.random()*22};});
  if(!satS&&dl<0.3)opts.push(()=>{satS={x:-6,dir:1,y:10+Math.random()*26};});
  if(dl<0.3)opts.push(()=>
    meteors.push({x:20+Math.random()*(W-40),y:4+Math.random()*40,vx:70+Math.random()*60,vy:18+Math.random()*16,life:0.7}));
  if(!deer&&dl>0.15&&dl<0.55&&seasonIdx!==3)opts.push(()=>{deer={x:TREES[1].x-6,tx:TREES[1].x-8-Math.random()*14,t:0,ph:0};});
  if(!devil&&dl>0.5&&weather<0.3&&seasonIdx===1)opts.push(()=>{devil={x:Math.random()<0.5?-12:W+12,dir:0,t:0,life:12};});
  if(opts.length)opts[(Math.random()*opts.length)|0]();
}
function folkPlan(f){
  if(f.id==='farmer'){
    if(yardPlay)return{vis:true,y:126,tx:YARDX-11};                 // playing catch at the picnic
    if(bikeRide&&bikeRide.mode==='practice')return{vis:true,y:126,tx:HX+2}; // watching Wade's laps from the yard edge
    if(tract.task&&tract.mov&&dl>0.4)return{vis:false};            // out on the tractor working the field (he's drawn in the cab)
    if(tod<0.27||tod>0.9)return{vis:false};
    if(tod<0.30)return{vis:true,enter:HX+12,y:125,tx:BARNX+18,chore:'hay'};   // rolling a hay bale in
    if(tod<0.335)return{vis:true,y:125,tx:BARNX+9,chore:'feed'};              // feeding the hens
    if(tod<0.36)return{vis:true,y:125,tx:HX+24,chore:'water'};                // topping the stock tank
    if(tod<0.5)return{vis:true,y:125,pa:BARNX+16,pb:BARNX+40};      // puttering around the barnyard
    if(cropWalk&&tod<0.56)return{vis:true,y:130,tx:Math.round(lerp(BARNX+40,DX-18,clamp((tod-0.5)/0.06,0,1)))}; // inspecting the rows (starts east of the parked tractor)
    if(cropWalk&&tod<0.6)return{vis:true,y:130,tx:Math.round(lerp(DX-18,BARNX+40,clamp((tod-0.56)/0.04,0,1)))};    // and back up the headland
    if(tod<0.55)return{vis:true,y:125,tx:HX+12};                    // lunch
    if(tod<0.57)return{vis:false};                                  // a bite indoors, then back out (keeps an adult around the yard)
    if(tod<0.76)return{vis:true,enter:HX+12,y:125,pa:HX-8,pb:HX+22};
    return{vis:true,y:124,tx:HX+7,sit:true};                        // porch, watching the sunset
  }
  if(f.id==='kid'){
    if(famCar){if(famCar.ph==='board')return{vis:true,y:126,tx:famCar.x}; // climbing in
      if(famCar.ph!=='park')return{vis:false};}                      // riding along to town
    if(yardPlay)return{vis:true,y:126,tx:YARDX+11};                  // playing catch
    if(bikeRide)return{vis:false};                                   // he's on the bike, drawn separately
    if(seasonIdx===3&&snowCover>0.8)return{vis:false};
    if(YRS>=3){ // Wade works at the store now
      const SUN3=live?liveDate.getDay()===0:Math.floor(day)%7===0;
      if(!SUN3&&tod>0.52&&tod<0.75)return{vis:true,enter:LOTX2+16,y:124,pa:DX+8,pb:DX+52};
      if(tod>0.77&&tod<0.9)return{vis:true,enter:HX+14,y:125,pa:HX-6,pb:HX+20};
      return{vis:false};
    }
    if(tod<0.64||tod>0.79)return{vis:false};
    return{vis:true,enter:HX+14,y:125,pa:HX-10,pb:HX+18};           // after school, playing around the yard
  }
  if(f.id==='dot'){
    if(famCar){if(famCar.ph==='board')return{vis:true,y:125,tx:famCar.x}; // walking out to the wagon
      if(famCar.ph!=='park')return{vis:false};}                      // she's driving the kids to town
    if(yardPlay)return{vis:true,y:125,tx:YARDX+2,sit:true};          // on the picnic blanket
    if(tod<0.3||tod>0.9)return{vis:false};
    if(tod<0.40)return{vis:true,enter:HX+12,y:125,pa:HX+2,pb:HX+26};  // morning garden
    if(tod<0.42)return{vis:true,y:125,tx:HX+22,chore:'water'};        // watering the flowerbed
    if(tod<0.6)return{vis:false};
    if(tod<0.66)return{vis:true,enter:HX+12,y:125,tx:HX+23};          // tending the flowerbed
    if(tod<0.76)return{vis:false};
    return{vis:true,y:124,tx:HX+11,sit:true};                         // porch, beside Earl
  }
  if(f.id==='kid2'){ // Wade's little sister — family scenes and tagging along after school
    if(famCar){if(famCar.ph==='board')return{vis:true,y:126,tx:famCar.x};
      if(famCar.ph!=='park')return{vis:false};}
    if(yardPlay)return{vis:true,enter:HX+18,y:126,pa:YARDX-6,pb:YARDX+8};

function sync(){
  if(live){
    const d=liveDate=new Date();
    tod=(d.getHours()+d.getMinutes()/60+d.getSeconds()/3600)/24;
    const mo=d.getMonth(), dim=new Date(d.getFullYear(),mo+1,0).getDate();
    const sh=(mo+1)%12;               // meteorological seasons: Dec-Feb winter, etc.
    seasonIdx=((sh/3|0)+3)%4;
    seasonT=((sh%3)+(d.getDate()-1)/dim)/3;
    year=d.getFullYear();
    cropKind=d.getFullYear()%3;
    const ep=Math.floor((d.getTime()-EPOCH)/864e5);
    let comp=0;while(comp<TOWN.length&&TGROW[comp]<=ep)comp++;
    townN=clamp(comp+1,1,TOWN.length);
    if(comp>=TOWN.length)townProg=1;
    else{const pv=comp>0?TGROW[comp-1]:0;
      townProg=clamp((ep+tod-pv)/Math.max(1,TGROW[comp]-pv),0,1);}
    holiday=(mo===11);
    yF=Math.max(0,(d.getTime()-EPOCH)/31557600000);
    epDay=Math.max(0,ep);
  } else {
    day=time/DAYLEN; tod=day%1;
    seasonIdx=Math.floor(day/10)%4; seasonT=(day%10)/10;
    year=Math.floor(day/40)+1;
    cropKind=Math.floor(day/40)%3;
    townN=clamp(1+Math.floor(day/6),1,TOWN.length);
    townProg=clamp((day%6)/6,0,1);
    holiday=(seasonIdx===3&&seasonT>0.25&&seasonT<0.6);
    yF=day/40;
    epDay=Math.floor(day);
  }
  YRS=Math.floor(yF);
  // true solar geometry for the latitude: short winter days, long summer evenings
  const N=live?Math.floor((liveDate-new Date(liveDate.getFullYear(),0,0))/864e5)
             :(Math.floor(((seasonIdx*10+seasonT*10)/40)*365)+59)%365;
  const decl=-0.4093*Math.cos(TAU/365*(N+10));
  const cosH=clamp(-Math.tan(LOC.lat*0.017453)*Math.tan(decl),-1,1);
  dayFrac=Math.acos(cosH)/Math.PI;
  const tzo=live?liveDate.getTimezoneOffset():330;
  noonTod=tzo===300?0.572:(tzo===360?0.531:0.545);
  srT=noonTod-dayFrac/2; ssT=noonTod+dayFrac/2;
  dl=clamp((Math.min(tod-srT,ssT-tod)+0.02)/0.055,0,1);

  if(eclDemo>0)eclipseK=Math.max(eclipseK,Math.sin(Math.PI*Math.min(1,(24-eclDemo)/24)));

  ghK=4*dl*(1-dl)*0.16; // the sky already turns amber at dawn/dusk (skyPhase); this sits the SPRITES in that same light instead of just darkening them
}

function netReachable(){ // any independent host answering = internet is up (no-cors: we only need it to resolve, not read it)
  if(typeof fetch!=='function')return Promise.resolve(true);
  const hosts=['https://www.google.com/generate_204','https://www.cloudflare.com/cdn-cgi/trace','https://www.microsoft.com/favicon.ico'];
  const ping=u=>Promise.race([fetch(u,{mode:'no-cors',cache:'no-store'}).then(()=>true).catch(()=>false),
    new Promise(r=>setTimeout(()=>r(false),5000))]);
  return Promise.all(hosts.map(ping)).then(rs=>rs.some(Boolean)).catch(()=>false);
}
async function checkNet(){ // is the whole network/internet down? (savers only) — Keating burns when it is, clears the instant it's back

  let up=(typeof navigator==='undefined')||navigator.onLine!==false;  // OS reports a live network interface?
  if(up&&!wx)up=await netReachable();  // interface up but the feed's failing → confirm the internet is really reachable (a real outage vs. just the weather host being blocked — the firewall case we ignore)
  netProbeBusy=false;
  if(up){netFailN=0;netOff=false;}
  else if(++netFailN>=3)netOff=true;   // ~3 sustained fails (~1 min) before igniting; an 'online' event or any success clears it at once
}

function update(dt){

  }else{

    for(const row of cells)for(const c of row){
      if(c.t==='crop')c.g=Math.max(c.g,tgt);
      else if(c.t==='sunflower')c.g=Math.min(1,c.g+vdt*0.004);
    }
  }else if(seasonIdx<2||(seasonIdx===2&&seasonT<0.35)){
    const gr=sim/DAYLEN/13*(1+weather*0.9);
    for(const row of cells)for(const c of row){
      if(c.t==='crop')c.g=Math.min(1,c.g+gr);
      else if(c.t==='sunflower')c.g=Math.min(1,c.g+gr*1.7);
    }
  }

  // tractor (and the autonomous night shift)
  const nightShift=autoNight&&tod>0.78&&tod<0.97;
  const workHrs=(tod>0.3&&tod<0.78)||nightShift;
  // knock off at dusk — drop the field task so it drives home to the barn instead of freezing lit in the row
  if(tract.task&&tract.task.mode!=='cart'&&((tod>0.78&&!nightShift)||weather>0.55))tract.task=null; // knock off at dusk or when the rain sets in
  if(combine&&!combine.leave&&tod>0.87&&!nightShift)combine.leave=true; // combine heads for the field edge rather than stalling
  const step=(live?vdt:sim)*15*LX;
  const tY=tract.task?ROWY[tract.task.row]:PARK.y;
  const tS=tract.task?0.5+ROWSC[tract.task.row]*0.55:0.78;
  tract.y+=(tY-tract.y)*Math.min(1,vdt*3);
  tract.s+=(tS-tract.s)*Math.min(1,vdt*3);
  let moving=false;
  if(step>0&&tract.task&&tract.task.mode==='cart'){
    if(!combine)tract.task=null;
    else{
      const tx5=combine.x-combine.dir*24;
      const d5=Math.sign(tx5-tract.x);
      if(Math.abs(tx5-tract.x)>2){tract.x+=d5*step*1.5;wheelAng+=d5*step*0.45;moving=true;tract.dir=d5||1;}
    }
  } else if(step>0&&tract.task&&workHrs){
    const px0=tract.x;
    tract.x+=tract.dir*step; wheelAng+=tract.dir*step*0.3; moving=true;
    const t=tract.task;
    if(t.mode!=='cruise'){
      const lo=Math.min(px0,tract.x)-4,hi=Math.max(px0,tract.x)+4;
      const row=cells[t.row];
      for(let i=0;i<COLX.length;i++){
        if(COLX[i]<lo||COLX[i]>hi)continue;
        const c=row[i];
        if(t.mode==='plant'&&c.t==='none'){c.t='crop';c.g=0;c.wd=Math.random()<0.08;}
        else if(t.mode==='bale'&&c.t==='stubble'
          &&COLX[i]>Math.min(px0,tract.x)&&COLX[i]<=Math.max(px0,tract.x)){
          if(++baleC%14===0)bales.push({x:COLX[i],r:t.row});
        }
      }
    }
    if((tract.dir>0&&tract.x>W+16)||(tract.dir<0&&tract.x<-16)){
      if(t.mode==='cruise')tract.task=null;
      else{t.row++;
        if(t.row>=ROWS){
          if(t.mode==='plant')phase='growing'; else phase='stubble';
          tract.task=null;
        } else tract.dir*=-1;
      }
    }
  } else if(step>0&&!tract.task&&Math.abs(tract.x-PARK.x)>2){
    const d=Math.sign(PARK.x-tract.x);
    tract.x+=d*step; moving=true;
    if(Math.sign(PARK.x-tract.x)!==d)tract.x=PARK.x;
    tract.dir=d;
  }
  tract.mov=moving;
  // combine harvest (with unload-on-the-go into the grain cart)
  if(combine){
    combine.reel+=vdt*6;
    const cw=tod>0.3&&tod<0.9&&weather<0.5;
    if(combine.leave){
      combine.x+=combine.dir*18*vdt;
      if(combine.x<-40||combine.x>W+40)combine=null;
    } else if(unld){
      const tx6=combine.x-combine.dir*24;
      if(unld.ph==='come'&&Math.abs(tract.x-tx6)<=3){unld.ph='pour';unld.t=0;}
      else if(unld.ph==='pour'){unld.t+=vdt;
        if(unld.t>3.5){unld=null;combine.tank=0;tract.task=null;}}
    } else if(cw){
      const cspd=(live?vdt:sim)*11*LX,px0=combine.x;
      combine.x+=combine.dir*cspd;
      if(vdt>0&&weather<0.35&&Math.random()<0.35)                    // chaff & dust boil off the header on a dry cut
        smoke.push({x:combine.x-combine.dir*(9+Math.random()*5),y:ROWY[combine.row]-1,vx:-combine.dir*3+wind*0.08,vy:-1.5-Math.random()*2,life:0.9,max:0.9,c:Math.random()<0.3?'#d8c060':'#c2ab84'});
      const lo=Math.min(px0,combine.x)-5,hi=Math.max(px0,combine.x)+5;
      const row=cells[combine.row];
      for(let i=0;i<COLX.length;i++){
        if(COLX[i]<lo||COLX[i]>hi)continue;
        const c=row[i];
        if(c.t==='crop'||c.t==='sunflower'||c.t==='flat'){c.t='stubble';c.g=0;c.wd=false;combine.tank++;}
      }
      if(combine.tank>=46&&!unld&&combine.dir>0){unld={ph:'come',t:0};tract.task={mode:'cart',row:combine.row};} // summon the grain cart only on a right-moving pass, so the rendezvous is always on the harvested (west) side — the cart never crosses the combine body
      if((combine.dir>0&&combine.x>W+24)||(combine.dir<0&&combine.x<-24)){
        combine.row++;
        if(combine.row>=ROWS){combine.leave=true;phase='baling';}
        else combine.dir*=-1;
      }
    }
  }
  // round baler comes out once the combine is done
  if(phase==='baling'&&!combine&&!tract.task&&workHrs&&step>0){
    tract.task={mode:'bale',row:0};tract.dir=1;tract.x=-16;
  }
  // See & Spray pass: nozzles fire only where the weeds are
  if(sprayerDue&&!sprayer&&!fire&&phase==='growing'&&dl>0.4&&tod>0.32&&tod<0.7){ // don't send the sprayer out while the water truck is working a fire (they'd share row 3)
    sprayer={x:-24,dir:1,row:(sprayRow++)%ROWS,hitT:0};sprayerDue=false;
  }
  if(sprayer){
    const sspd=(live?vdt:sim)*16*LX,px0=sprayer.x;
    sprayer.x+=sprayer.dir*sspd;
    sprayer.hitT=Math.max(0,sprayer.hitT-vdt);
    const lo=Math.min(px0,sprayer.x)-16,hi=Math.max(px0,sprayer.x)+16;
    const row=cells[sprayer.row];
    for(let i=0;i<COLX.length;i++){
      if(COLX[i]<lo||COLX[i]>hi)continue;
      if(row[i].wd){row[i].wd=false;sprayer.hitX=COLX[i];sprayer.hitT=0.3;}
    }
    if(sprayer.x>W+34)sprayer=null;
  }
  if(moving){puffT-=vdt; if(puffT<0){puffT=0.16;
    smoke.push({x:tract.x+tract.dir*3,y:tract.y-15*tract.s,vx:(Math.random()-0.5)*3,vy:-9-Math.random()*3,life:0.9,max:0.9,c:'#8b8f99'});
    if(tract.task&&weather<0.35&&snowCover<0.2)                     // dry fieldwork kicks up a low tan plume behind the implement
      smoke.push({x:tract.x-tract.dir*(7+Math.random()*4),y:tract.y-1,vx:-tract.dir*2+(Math.random()-0.5)*2,vy:-1.2-Math.random()*1.6,life:1.1,max:1.1,c:'#c2ab84'});}}

  // chimney smoke
  const coldOut=(live&&wx)?wx.tempF<55:(seasonIdx===3||(seasonIdx!==1&&dl<0.45));
  if(coldOut){chimT-=vdt; if(chimT<0){chimT=0.55+Math.random()*1.6;   // irregular puffs, not a constant plume — a fire draws in wisps, not a steady jet
    smoke.push({x:HX+21.5,y:HOR-22,vx:(Math.random()-0.5)*2,vy:-6-Math.random()*3,life:1.7,max:1.7,c:'#cfd3dd'});}}

  // particle spawns
  const spawn=n=>Math.floor(n)+(Math.random()<n%1?1:0);
  if(vdt>0){
    if(weather>0.05&&!wSnow){let k=spawn(weather*130*vdt);
      while(k--)drops.push({x:Math.random()*(W+30)-15,y:-4,v:150+Math.random()*50,gy:HOR+3+Math.random()*(H-HOR-6)});}
    if(weather>0.05&&wSnow){let k=spawn(weather*60*vdt);
      while(k--)flakes.push({x:Math.random()*(W+30)-15,y:-4,v:13+Math.random()*9,ph:Math.random()*TAU,gy:HOR+2+Math.random()*(H-HOR-4)});}
    if(seasonIdx===2){let k=spawn((0.5+seasonT)*2.4*vdt);
      while(k--){const t=TREES[1+(Math.random()*3|0)];
        leaves.push({x:t.x+(Math.random()*12-6),y:HOR-14+Math.random()*6,vy:9+Math.random()*6,ph:Math.random()*TAU,
          c:['#c96f35','#b3552e','#d99a3c'][Math.random()*3|0],gy:HOR+10+Math.random()*70});}}
    if(dl>0.6&&seasonIdx!==3&&Math.random()<0.0007)spawnFlock(Math.random()<0.5?1:-1);
    if(dl<0.12&&!shoot&&Math.random()<0.00025)
      shoot={x:20+Math.random()*(W-80),y:6+Math.random()*38,vx:90+Math.random()*50,vy:26,life:0.8};
    if(wThun&&weather>0.6&&Math.random()<0.0025)flashT=0.2;
  }
  flashT=Math.max(0,flashT-vdt);

  // particle motion
  drops=drops.filter(p=>{p.y+=p.v*vdt;p.x+=wind*0.35*vdt;return p.y<p.gy;});
  flakes=flakes.filter(p=>{p.y+=p.v*vdt;p.x+=(Math.sin(rt*1.5+p.ph)*6+wind*0.35)*vdt;return p.y<p.gy;});
  smoke=smoke.filter(p=>{p.life-=vdt;p.x+=(wind*0.12+p.vx)*vdt;p.y+=p.vy*vdt;return p.life>0;});
  leaves=leaves.filter(p=>{p.y+=p.vy*vdt;p.x+=(Math.sin(rt*2.2+p.ph)*9+wind*0.12)*vdt;return p.y<p.gy;});
  birds=birds.filter(b=>{b.x+=b.v*vdt;b.y+=Math.sin(rt*4+b.ph)*3*vdt;return b.x>-24&&b.x<W+24;});
  if(shoot){shoot.x+=shoot.vx*vdt;shoot.y+=shoot.vy*vdt;shoot.life-=vdt*1.4;if(shoot.life<=0)shoot=null;}
  for(const f of flies){f.p+=vdt*(1+f.sp);
    f.x+=Math.sin(f.p*0.6+f.sp*7)*10*vdt; f.y+=Math.cos(f.p*0.53+f.sp*5)*6*vdt;
    f.x=clamp(f.x,14,W-14); f.y=clamp(f.y,HOR+8,H-8);}
  for(const b of flutters){b.p+=vdt*(1.4+b.sp);                    // monarchs wander the field, unhurried
    b.x+=(Math.cos(b.p*0.5)*7+wind*0.06)*vdt; b.y+=Math.sin(b.p*1.1)*6*vdt;
    b.x=clamp(b.x,12,W-12); b.y=clamp(b.y,HOR+4,H-42);}
  if(dl>0.35&&seasonIdx!==3&&weather<0.45){
    const fm=folk[0];
    chicks.forEach((c,i)=>{
      if(c.flee>0)c.flee-=vdt;                                     // a spooked hen stays spooked a moment
      else if(fm.vis&&fm.chore==='feed'){c.tx=fm.x+((i%3)-1)*6;c.ty=c.hy;} // feeding time calls them up from the field
      else if(Math.random()<0.008){
        const fld=Math.random()<0.12;                                  // now and then, a stroll down among the rows
        let t8=fld?BARNX-4+Math.random()*72:BARNX+4+Math.random()*58;
        if(Math.abs(t8-PARK.x)<13)t8=t8<PARK.x?PARK.x-13-Math.random()*5:PARK.x+13+Math.random()*5; // never under the parked tractor
        if(!fld&&t8<BARNX+11)t8=BARNX+11+Math.random()*8;              // and never in the round-bale stack
        c.tx=t8;c.ty=fld?131+Math.random()*6:c.hy;
      }
      const dx=c.tx-c.x,dy9=c.ty-c.y;
      if(Math.abs(dx)>1.5){c.x+=Math.sign(dx)*7*vdt;c.d=Math.sign(dx)||1;c.pk=0;}
      if(Math.abs(dy9)>1){c.y+=Math.sign(dy9)*3.5*vdt;c.pk=0;}
      else if(Math.abs(dx)<=1.5)c.pk+=vdt*6;
    });
  }
  // little lives
  for(const f of folk){
    const plan=folkPlan(f);
    f.chore=plan.chore||null;
    let vis=!!plan.vis;
    if(weather>=0.4)vis=vis&&f.wasVis&&weather<0.62;   // caught out when rain starts: hurry to cover, don't blink out of existence
    if(vis&&!f.wasVis){
      if(plan.enter!==undefined)f.x=f.tx=plan.enter;
      else if(!f.placed)f.x=f.tx=plan.tx!==undefined?plan.tx:plan.pa!==undefined?(plan.pa+plan.pb)/2:f.x; // booted mid-scene: they were already there
    }
    if(vis)f.placed=true;
    f.wasVis=vis;f.vis=vis;
    if(!vis)continue;
    if(f.hold>0){f.hold-=vdt;f.walking=false;continue;}
    f.y=plan.y||125;
    if(weather>=0.4)f.tx=(f.id==='boss'||f.id==='tech')?W+20:HX+12;  // making for shelter — staff toward the road, family to the house
    else if(plan.tx!==undefined)f.tx=plan.tx;
    else if(plan.pa!==undefined&&Math.abs(f.tx-f.x)<=1.2){
      f.idleT=(f.idleT||0)-vdt;
      if(f.idleT<=0){f.idleT=5+Math.random()*9;                     // settle longer, and mostly shuffle in place — puttering, not pacing sideline to sideline
        f.tx=Math.random()<0.7?clamp(f.x+(Math.random()*18-9),plan.pa,plan.pb):plan.pa+Math.random()*(plan.pb-plan.pa);}
    }
    f.sit=!!plan.sit&&weather<0.4&&Math.abs(f.tx-f.x)<=1.6;   // walk to the porch first, then sit (never sit out in the rain)
    const dx4=f.tx-f.x;
    if(Math.abs(dx4)>1.2&&!f.sit){f.dir=dx4>0?1:-1;
      const spd=f.id==='kid'?12:6.5;
      f.x+=f.dir*spd*vdt;f.stepT+=vdt*spd*0.45;f.walking=true;}  // cadence tracks ground speed (~3 steps/s amble, Wade scampers) — was a flat 8 flips/s on everyone
    else f.walking=false;
  }
  {
    const dp=dogPlan();
    let dvis=!!dp.vis;
    if(weather>=0.4)dvis=dvis&&dog.wasVis&&weather<0.62;   // trots to the barn in the rain rather than vanishing
    if(dvis&&!dog.wasVis)dog.x=dp.enter!==undefined?dp.enter:dp.tx;
    dog.wasVis=dvis;dog.vis=dvis;
    if(dvis){
      const dtx=weather>=0.4?BARNX+40:dp.tx;
      dog.nap=weather<0.4&&!!dp.nap&&Math.abs(dp.tx-dog.x)<4;
      dog.y=dp.y;
      const dx5=dtx-dog.x;
      if(dog.greetT>0)dog.greetT-=vdt;
      else if(Math.abs(dx5)>2&&!dog.nap){dog.dir=dx5>0?1:-1;dog.x+=dog.dir*11*vdt;dog.stepT+=vdt*9;}
      for(const c of chicks)if(Math.abs(dog.x-c.x)<9&&!dog.nap){c.tx=c.x+(c.x<dog.x?-14:14);c.flee=0.8;}
    }
  }
  // small kindnesses: waves, greetings, and a kid scattering hens
  {
    const kd=folk[3];
    if(kd.vis)for(const c of chicks)if(Math.abs(kd.x-c.x)<7){c.tx=c.x+(c.x<kd.x?-12:12);c.flee=0.8;}
    if(train){
      for(const f of folk)
        if(f.vis&&!f.waved&&f.hold<=0&&(f.id==='farmer'||f.id==='kid'||f.id==='dot')&&Math.random()<0.02){
          f.hold=2.2;f.wave=true;f.waved=true;f.dir=train.x>f.x?1:-1;}
    } else for(const f of folk)f.waved=false;
    for(const h of haulers)if(h.ph===1&&!h.byed){h.byed=true;
      const hal=folk[1];if(hal.vis&&hal.hold<=0){hal.hold=2;hal.wave=true;hal.dir=h.dir;}}
    if(partsT&&partsT.ph===1&&!partsT.seen){partsT.seen=true;
      const manny=folk[2];if(manny.vis&&manny.hold<=0){manny.hold=3;manny.wave=true;manny.dir=-1;}}
    for(const v of visitors)if(v.st==='walkin'&&!v.hi){v.hi=true;   // Hal greets every customer who walks up, small-town style
      const hal=folk[1];if(hal.vis&&hal.hold<=0){hal.hold=1.6;hal.wave=true;hal.dir=v.wx>hal.x?1:-1;}}
    if(svcDrop&&svcDrop.ph==='park'&&!svcDrop.seen){svcDrop.seen=true;  // Manny comes out to meet the drop-off
      const mn2=folk[2];if(mn2.vis&&mn2.hold<=0){mn2.hold=2.5;mn2.wave=true;mn2.dir=-1;}}
    const k2=folk[5];                                                   // a puff of dandelion seeds drifts off downwind
    if(k2At>0&&tod>k2At&&tod<k2At+0.012&&k2.vis&&k2.sit&&vdt>0&&Math.random()<0.003)
      for(let s5=0;s5<5;s5++)smoke.push({x:k2.x+1,y:124-Math.random()*2,vx:1.5+wind*0.12+Math.random(),
        vy:-0.6-Math.random()*0.8,life:1.6+Math.random()*0.8,max:2.4,c:'#eef2f2'});
    const earl=folk[0];
    // Hal and Manny cross paths in the lot and stop to talk shop, face to face
    halMannyT-=vdt;
    {const hal=folk[1],mn=folk[2],gap=Math.abs(folk[1].x-folk[2].x);
     if(hal.vis&&mn.vis&&hal.hold<=0&&mn.hold<=0&&gap<10&&gap>2&&halMannyT<=0&&dl>0.35&&!tourCust){
       halMannyT=28+Math.random()*22;
       hal.dir=mn.x>hal.x?1:-1;mn.dir=hal.x>mn.x?1:-1;    // turn to each other
       hal.hold=2.7;hal.wave=true;                         // Hal's doing the talking, hand moving
       mn.hold=2.7;mn.wave=false;}}                        // Manny hears him out
    // Hal points a customer at a machine while they look it over
    if(tourCust&&tourCust.tdwell>0&&tourCust.st==='tour'){
      const hal=folk[1];
      if(hal.vis&&hal.hold<=0&&Math.random()<0.02){hal.hold=1.8;hal.wave=true;hal.dir=tourCust.wx>hal.x?1:-1;}}
    // Earl & Dot trade a word on the porch — one leans in to say something, the other turns to listen
    porchT-=vdt;
    {const dt=folk[4];
     if(earl.vis&&dt.vis&&earl.sit&&dt.sit&&earl.hold<=0&&dt.hold<=0&&porchT<=0&&Math.abs(earl.x-dt.x)<8){
       porchT=17+Math.random()*20;
       const talker=Math.random()<0.5?earl:dt,other=talker===earl?dt:earl;
       talker.dir=other.x>talker.x?1:-1;other.dir=talker.x>other.x?1:-1;
       talker.hold=2.3;talker.wave=true;talker.sit=false; // leans up out of the chair with a gesture
       other.hold=2.3;other.wave=false;}}                 // stays sat, turned toward the talker
    dogGreet-=vdt;
    // Boone greets the folks he knows by name
    if(dog.vis&&dogGreet<=0){
      const dt=folk[4];
      if(earl.vis&&Math.abs(dog.x-earl.x)<6){dogGreet=75;earl.hold=1.6;earl.wave=false;dog.greetT=1.6;}
      else if(dt.vis&&Math.abs(dog.x-dt.x)<6){dogGreet=70;dog.greetT=1.6;}         // a tail-wag for Dot
    }
    if(dog.vis&&folk[3].vis&&Math.abs(dog.x-folk[3].x)<8&&dog.greetT<=0&&Math.random()<0.012)dog.greetT=1.2; // tail going while he trails Wade
    // (winter breath puffs removed — at this scale they read as smoking)
  }
  // Gus works the fence line at dusk
  {
    const catOK=dl<0.55&&weather<0.4&&snowCover<0.7;
    if(catOK&&!cat.vis){cat.vis=true;cat.x=cat.tx=HX+34+Math.random()*Math.max(6,(DX-16)-(HX+34));}
    if(!catOK)cat.vis=false;
    if(cat.vis){
      if(Math.abs(cat.tx-cat.x)<1){cat.sit-=vdt;
        if(cat.sit<=0){cat.sit=4+Math.random()*8;
          cat.tx=HX+33+Math.random()*Math.max(6,(DX-16)-(HX+33));}
      }else{cat.dir=Math.sign(cat.tx-cat.x)||1;cat.x+=cat.dir*5*vdt;}
    }
  }
  for(const c of clouds){c.x+=c.v*(0.4+wind*0.04)*vdt;if(c.x>W+40){c.x=-40;c.y=8+Math.random()*44;}}
}

// ---------- draw helpers ----------
function circle(x,y,r,style){g.fillStyle=style;g.beginPath();g.arc(x,y,r,0,TAU);g.fill();}
function shadow(x,y,w){g.fillStyle='rgba(10,12,20,0.20)';g.beginPath();g.ellipse(x,y+0.6,w,1.1,0,0,TAU);g.fill();}
function hillPath(base,amp,s1,s2,p1,p2){
  g.beginPath();g.moveTo(0,H);
  for(let x=0;x<=W;x+=4)g.lineTo(x,base-(Math.sin(x*s1+p1)*0.6+Math.sin(x*s2+p2)*0.4)*amp);
  g.lineTo(W,H);g.closePath();g.fill();
}
function tree(x,big){
  const s=(big?1:0.75)*(1+Math.min(0.25,yF*0.08));
  P(x-1,HOR-8*s,2,8*s,'#5a4632');
  if(seasonIdx!==3&&snowCover<0.4){ // grass collects at the trunk
    g.fillStyle=shA(mixA(spal('verge'),C('#3f6030'),0.4),0.68);
    g.fillRect(x-3+((x*7)%2),HOR-1,1,1);g.fillRect(x+2,HOR-1,1,1);
  }
  if(seasonIdx===3){
    g.strokeStyle=S('#5a4632');g.lineWidth=1;g.beginPath();
    g.moveTo(x,HOR-6*s);g.lineTo(x,HOR-15*s);
    g.moveTo(x,HOR-11*s);g.lineTo(x-4*s,HOR-15*s);

function vfwDaily(){ // tonight's roster at the post, and the flag's duty
  halfMast=false;memDay=false;
  if(live){
    const m=liveDate.getMonth(),d=liveDate.getDate();
    if((m===8&&d===11)||(m===11&&d===7)||(m===4&&d===15))halfMast=true;
    if(m===4){
      const off=(new Date(liveDate.getFullYear(),4,31).getDay()+6)%7;
      if(d===31-off)memDay=true; // Memorial Day: half-staff until noon
    }
  }else halfMast=dayRng('vfw')()<0.05;
  vfwLot=vfwLot.filter(p=>p.st==='sleep'); // last night's sleepers are still out there
  const wd2=live?liveDate.getDay():(Math.floor(day)%7);
  const busy=(wd2===5||wd2===6)||(live&&liveDate.getMonth()===10&&liveDate.getDate()===11)||epDay===SAGA.won;
  const n=2+(Math.random()*3|0)+(busy?2:0);
  const roster=[];
  for(let i=0;i<n&&i<6;i++){
    const bike=Math.random()<0.4;
    roster.push({
      kind:bike?'bike':'truck',
      col:bike?['#2a2d34','#7a2430','#4a4e58'][i%3]:['#4a6a9c','#8a8f98','#7a3a3a','#3d5c46'][i%4],
      st:'pre',wx:0,wt:0,
      arriveAt:i===0?0.6667:(Math.random()<0.35?0.6806+Math.random()*0.0798:0.7604+Math.random()*0.042), // regular opens at 4pm sharp; ~35% trickle in 4:20-6:15, the other ~65% SURGE 6:15-6:56 (tight cluster so it reads as a real rush, not an even dribble to 8pm)
      leaveAt:0.8646+Math.random()*0.13,
      departAt:0.255+Math.random()*0.03,   // overnight sleepers pull out 6:07-6:50am — safely BEFORE the ~7am crew sweep, so an arriving staff car never drives through a still-parked truck
      sleeper:Math.random()<0.14,
      toFarm:Math.random()<0.3,
      cap:['#8a2f2a','#2f5f2e','#3a3d45','#c9a985','#e8853c','#3a5a8c'][i%6],
      shirt:['#5a6a8c','#7a3a3a','#3d5c46','#9aa2ae','#6b5644','#37424e'][i%6],
    });
  }
  // Park in ARRIVAL ORDER, filling west→east. Everyone drives in from the far east, so if the earliest
  // arrival takes the westmost slot and each later one parks the next slot east, an inbound truck always
  // halts east of every already-parked truck — it never crosses one. (Fixes the old slot-by-index drive-through.)
  roster.sort((a,b)=>a.arriveAt-b.arriveAt);
  roster.forEach((p,r)=>{p.slot=r;p.x=W+20+r*13;}); // spawn queued east, 13px apart ≥ 11px slot spacing, so no interpenetration in transit either
  for(const p of roster)vfwLot.push(p);
}

// vignette as a UNIT-circle gradient (inner 0.44 → outer 1.0), stretched to an ellipse that scales
// with W each frame — so the side framing stays proportional on ultra-wide / multi-monitor spans
// instead of pinning the radius to height and blacking out the inner halves of the extra screens.
const SIGNG=g.createRadialGradient(0,0,0.04,0,0,1); // unit-space sign bloom (scaled at draw time, like VIG)
SIGNG.addColorStop(0,'rgba(255,214,96,0.26)');SIGNG.addColorStop(0.55,'rgba(255,200,80,0.08)');SIGNG.addColorStop(1,'rgba(255,200,80,0)');

function skyPhase(){ // warp real sunrise/sunset onto the palette timeline
  if(tod<srT)return (tod/Math.max(0.01,srT))*0.26;
  if(tod<ssT)return 0.26+((tod-srT)/Math.max(0.01,ssT-srT))*0.49;
  return 0.75+((tod-ssT)/Math.max(0.01,1-ssT))*0.25;
}
function moonPhase(){ // 0=new, 0.5=full — the real one
  const syn=29.530588;
  if(live){const d2=(liveDate.getTime()-Date.UTC(2000,0,6,18,14))/864e5;
    return(((d2%syn)+syn)%syn)/syn;}
  return (day%syn)/syn;
}
function skyCols(){
  const sph=clamp(skyPhase(),0,0.999);
  let i=0;while(SKY[i+1][0]<sph)i++;
  const a=SKY[i],b=SKY[i+1],t=(sph-a[0])/(b[0]-a[0]);
  const grey=C('#6b7484');
  const out=[];
  for(let k=1;k<=3;k++)out.push(mixA(mixA(C(a[k]),C(b[k]),t),grey,weather*0.45));
  return out;
}

    if(tract.task&&tract.task.row===r){
      const tm=tract.task.mode;
      if(tm==='plant')drawPlanter(tract.x,tract.y,tract.s,tract.dir);
      else if(tm==='bale')drawBaler(tract.x,tract.y,tract.s,tract.dir);
      else if(tm==='cart')drawCart(tract.x-tract.dir*15*tract.s,tract.y,tract.s,tract.dir,
        unld&&unld.ph==='pour'?Math.min(1,unld.t/3.5):0);
      const nightAuto=dl<0.35&&(tm==='plant'||tm==='bale');
      drawTractorAt(tract.x,tract.y,tract.s,tract.dir,tract.mov,!nightAuto,nightAuto?false:'red'); // Earl (red cap) in the cab by day; riderless on the autonomous night shift
      if(dl<0.35&&tract.mov)workLights(tract.x,tract.y,tract.s,tract.dir,nightAuto);
    }
    if(combine&&Math.min(combine.row,ROWS-1)===r){
      const cs2=0.5+ROWSC[r]*0.55;
      drawCombine(combine.x,ROWY[r],cs2,combine.dir);
      if(dl<0.35&&!combine.leave)workLights(combine.x,ROWY[r],cs2,combine.dir,false);
    }
    if(sprayer&&sprayer.row===r)drawSprayer(sprayer.x,ROWY[r],0.5+ROWSC[r]*0.55,sprayer.dir);
    if(r===0)drawHens(c8=>c8.y>=ROWY[0]); // hens strolling row 0 stand among its stalks — over row-0 crops, still behind rows 1-3
  }

  // grain on the go & targeted spray
  if(unld&&unld.ph==='pour'&&combine){
    const crow=Math.min(combine.row,ROWS-1),cs3=0.5+ROWSC[crow]*0.55;
    const ax4=combine.x-combine.dir*16*cs3,ay4=ROWY[crow]-19*cs3;
    const cx5=tract.x-tract.dir*15*tract.s,cy5=tract.y-9*tract.s;
    g.fillStyle='rgba(232,200,60,0.9)';
    for(let i2=0;i2<9;i2++){
      const t3=((i2+rt*6)%9)/9;
      const gx=lerp(ax4,cx5,t3),gy=lerp(ay4,cy5,t3)-Math.sin(t3*Math.PI)*5;
      g.fillRect(gx|0,gy|0,1,1);
    }
  }
  if(sprayer&&sprayer.hitT>0){
    const hy4=ROWY[sprayer.row];
    g.fillStyle='rgba(120,220,130,0.75)';
    g.fillRect(sprayer.hitX,hy4-9,1,2);
    g.fillRect(sprayer.hitX,hy4-6,1,2);
    g.fillRect(sprayer.hitX,hy4-3,1,1);
  }

  // (impact crater moved BEFORE the field row loop — it's a hole in the ground, so
  //  crops, bales, and working machines all draw over it, not under it)

  // fire, water truck, spray & prairie oddities
  if(fire&&fire.phase<2&&fire.r>0.3){
    for(const rI of[1,2]){
      const fy=ROWY[rI];
      for(let i=Math.max(0,fire.c-9);i<Math.min(COLX.length,fire.c+10);i++){
        const d=Math.abs(i-fire.c)+(rI===1?1.5:0);
        if(d<fire.r&&d>fire.r-3){
          const fh=2+((Math.sin(rt*13+i*3.7)+1)*2.2|0);
          g.fillStyle=['#e85a20','#ff9d2e','#ffd23e'][((rt*17+i)%3)|0];
          g.fillRect(COLX[i],fy-fh-1,1,fh);
          if((((rt*9+i)|0)%2))g.fillRect(COLX[i],fy-fh-2,1,1);
        }
      }
    }
  }
  if(fire&&fire.phase>=1)drawTruck(fire.truckX,ROWY[3]+6,1.05,fire.phase===2?-1:1); // ride the bare foreground below the last crop row, so it reads as driving in FRONT of the field, not on it
  if(spray.length){g.fillStyle='rgba(138,192,238,0.8)';
    for(const p of spray)g.fillRect(p.x|0,p.y|0,1,1);}
  if(devil){
    g.fillStyle='rgba(194,169,120,0.16)';
    for(let i=0;i<8;i++){
      const yy=H-8-i*10,wob=Math.sin(rt*7+i*1.1)*(1+i*0.5);
      g.beginPath();g.ellipse(devil.x+wob,yy,2.5+i*1.1,4.5,0,0,TAU);g.fill();
    }
  }
  for(const t of tumbles){
    g.strokeStyle=S('#a8925a',0.55);g.lineWidth=1;
    g.beginPath();g.arc(t.x,t.y,t.r,0,TAU);g.stroke();
    g.beginPath();
    g.moveTo(t.x-t.r*Math.cos(t.a),t.y-t.r*Math.sin(t.a));
    g.lineTo(t.x+t.r*Math.cos(t.a),t.y+t.r*Math.sin(t.a));
    g.moveTo(t.x-t.r*Math.cos(t.a+1.3),t.y-t.r*Math.sin(t.a+1.3));
    g.lineTo(t.x+t.r*Math.cos(t.a+1.3),t.y+t.r*Math.sin(t.a+1.3));
    g.stroke();
  }

  // incoming asteroid & impact debris
  if(asteroid&&!asteroid.impact){
    const p=Math.min(1,asteroid.t/1.1);
    const ax3=asteroid.tx-(1-p)*W*0.35,ay3=-20+p*(asteroid.ty+20);
    const vx3=W*0.35/1.1,vy3=(asteroid.ty+20)/1.1;
    g.globalCompositeOperation='lighter';
    for(let i=1;i<=8;i++){const k=i*0.014;
      circle(ax3-vx3*k,ay3-vy3*k,Math.max(0.5,3-i*0.28),`rgba(255,${160-i*12},60,${0.28-i*0.03})`);}
    circle(ax3,ay3,4,'rgba(255,200,120,0.5)');
    g.fillStyle='#fff2d8';g.fillRect(ax3-1,ay3-1,3,3);
    g.globalCompositeOperation='source-over';
  }
  if(debris.length){
    for(const p of debris){g.fillStyle=p.col;g.globalAlpha=Math.min(1,p.life*1.6);
      g.fillRect(p.x|0,p.y|0,p.life>0.7?2:1,p.life>0.7?2:1);}
    g.globalAlpha=1;
  }

  // weather & ambient particles
  if(drops.length){g.fillStyle='rgba(165,195,235,0.55)';
    for(const p of drops)g.fillRect(p.x|0,p.y|0,1,3);}
  if(flakes.length){g.fillStyle='rgba(240,245,252,0.85)';
    for(const p of flakes)g.fillRect(p.x|0,p.y|0,1,1);}
  for(const p of leaves){g.fillStyle=S(p.c,0.5);g.fillRect(p.x|0,p.y|0,1,1);}
  for(const p of smoke){const a=(p.life/p.max)*0.35;
    circle(p.x,p.y,1+(1-p.life/p.max)*2,`rgba(${C(p.c)[0]},${C(p.c)[1]},${C(p.c)[2]},${a})`);}
  // crop duster — foreground, over its own trail: it sprays the near field, so it passes in FRONT
  // of the buildings instead of vanishing behind Keating while the trail sails on without it
  if(duster&&duster.started){
    const px2=duster.x,py2=HOR-16+Math.sin(rt*2)*1.5;
    g.fillStyle=S('#e8c83c',0.5);
    g.fillRect(px2-4,py2,8,2);
    g.fillRect(px2-1,py2-2,4,1);
    g.fillRect(px2-6,py2-1,2,2);
    g.fillStyle=S('#30343c',0.5);
    g.fillRect(px2+4,py2-1+(((rt*30)|0)%3-1),1,3);
  }

  // monarchs drifting over the field on warm, clear summer days
  if(seasonIdx===1&&dl>0.62&&weather<0.3&&snowCover<0.2){
    for(const b of flutters){
      const up=Math.sin(b.p*5)>0, bx3=b.x|0, by3=b.y|0;
      g.fillStyle=S('#e07b2a',0.55);
      g.fillRect(bx3-1,by3-(up?1:0),1,1);g.fillRect(bx3+1,by3-(up?1:0),1,1); // wings beating
      g.fillStyle=S('#2a1e14',0.5);g.fillRect(bx3,by3,1,1);                   // body
    }
  }
  // fireflies
  const fActive=(seasonIdx===1||(seasonIdx===2&&seasonT<0.35))&&dl<0.3;
  if(fActive){g.globalCompositeOperation='lighter';
    for(const f of flies){
      const a=Math.max(0,Math.sin(f.p*1.4+f.sp*10));
      if(a>0.1){circle(f.x,f.y,2,`rgba(216,242,140,${a*0.2})`);
        g.fillStyle=`rgba(236,255,170,${a*0.9})`;g.fillRect(f.x|0,f.y|0,1,1);}
    }
    g.globalCompositeOperation='source-over';
  }

  // the visitor
  if(ufo){
    const ux=ufo.x+Math.sin(rt*3)*1.5,uy=ufo.y;
    if(ufo.ph===1){
      g.fillStyle='rgba(140,255,170,0.10)';
      g.beginPath();g.moveTo(ux-2,uy+2);g.lineTo(ux+2,uy+2);
      g.lineTo(ux+9,ROWY[2]);g.lineTo(ux-9,ROWY[2]);g.closePath();g.fill();
    }
    g.fillStyle=S('#8a92a4',0.3);
    g.beginPath();g.ellipse(ux,uy,6,2,0,0,TAU);g.fill();
    g.fillStyle=S('#b8c4d8',0.3);
    g.beginPath();g.arc(ux,uy-2,2.2,Math.PI,TAU);g.fill();
    g.fillStyle=['#ff6a6a','#6aff8a','#6a9aff'][((rt*6)|0)%3];
    g.fillRect((ux|0)-3+(((rt*6)|0)%3)*3,uy+1,1,1);
  }

  // fog banks
  if(fogT>0.03){
    const off=Math.sin(rt*0.12)*16;
    g.fillStyle=`rgba(203,212,226,${fogT*0.13})`;g.fillRect(0,HOR-8,W,11);
    g.fillStyle=`rgba(203,212,226,${fogT*0.10})`;g.fillRect(0,HOR+3,W,14);
    g.fillStyle=`rgba(203,212,226,${fogT*0.07})`;g.fillRect(0,HOR+17,W,18);
    g.fillStyle=`rgba(214,222,234,${fogT*0.08})`;g.fillRect(off,HOR-4,W*0.6,9);
  }
  if(duckHunt){
    const D=duckHunt;
    for(const k of D.ducks)drawDuck(k);
    drawHunter(D);
    if(D.ph!=='out'&&mouseX>=0&&mouseY<HOR){ // aiming reticle
      g.strokeStyle='rgba(255,255,255,0.72)';g.lineWidth=1;g.beginPath();
      g.arc(mouseX,mouseY,3,0,TAU);
      g.moveTo(mouseX-5,mouseY);g.lineTo(mouseX-1.5,mouseY);g.moveTo(mouseX+1.5,mouseY);g.lineTo(mouseX+5,mouseY);
      g.moveTo(mouseX,mouseY-5);g.lineTo(mouseX,mouseY-1.5);g.moveTo(mouseX,mouseY+1.5);g.lineTo(mouseX,mouseY+5);g.stroke();
    }
  }
  if(flashT>0){g.fillStyle=`rgba(240,244,255,${Math.min(0.45,flashT*2)})`;g.fillRect(0,0,W,H);}
  { // heat shimmer on scorching afternoons — thin strips of the drawn scene wobble sideways over the far field (the same ≥97°F gate as the crop-fire risk)
    const scorch2=live?(wx&&wx.tempF>=97&&weather<0.2):(seasonIdx===1&&weather<0.12);
    if(scorch2&&dl>0.55&&fogT<=0)for(let i=0;i<4;i++){
      const sy2=119+i*4,ox=Math.sin(rt*(5.5+i*0.9)+i*1.7)*0.5;
      g.drawImage(cv,0,sy2*SS,cv.width,2*SS,ox,sy2,W,2);
    }
  }
  g.save();g.translate(W/2,H*0.52);g.scale(W*0.534,H*0.95);g.fillStyle=VIG;g.fillRect(-1.1,-1.1,2.2,2.2);g.restore(); // ellipse scales with W (0.534W ≈ the old H*0.95 radius at 16:9), so wide spans keep the single-screen framing
  if(shake)g.restore();

  // hud
  if(live){
    const ds=liveDate.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});
    const ts=liveDate.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
    hud.textContent=`${LOC.label} · ${ds} · ${ts}`
      +(wx?` · ${wx.tempF}°F`:'')
      +` · ${SEASONS[seasonIdx]}`
      +(netFireOn?' · ⚠ offline':paused?' · ⏸':' · live')
      +(sunCount?` · ✿ ${sunCount}`:'');
  }else{
    const h24=tod*24,hh=h24|0,mm=(h24-hh)*60|0,h12=hh%12||12,ap=hh<12?'AM':'PM';
    hud.textContent=`Year ${year} · ${SEASONS[seasonIdx]} · Day ${(day%10|0)+1} · `
      +`${h12}:${mm<10?'0':''}${mm} ${ap}  ${paused?'⏸ paused':'×'+SPD[spi]}`
      +' · sim (L = live)'
      +(sunCount?` · ✿ ${sunCount}`:'');
  }
}

// ---------- boot ----------
if(typeof location!=='undefined'&&location.search.indexOf('saver')>=0)document.getElementById('hint').style.display='none';
addEventListener('resize',()=>{ if(typeof location!=='undefined'&&innerWidth>0&&innerHeight>0&&Math.abs(innerWidth/innerHeight-AR)>AR*0.2)location.reload(); });
sync();
lastSeason=seasonIdx; lastDateStr=liveDate.toDateString();
synthSeason(seasonIdx);
onNewDay();
try{ // restore today's crater if an asteroid already hit this display
  const cs=localStorage.acresCrater;
  if(cs){const parts=cs.split('|');
    if(parts[0]===(live?liveDate.toDateString():'sim'+Math.floor(day))){
      applyCrater(+parts[1],+parts[2]);crater.age=200;
    }else localStorage.removeItem('acresCrater');
  }
}catch(e5){}
fetchWx(); setInterval(fetchWx,15*60*1000);
// whole-network/internet-down watch (savers): Keating catches fire until the connection's back. The artifact has net but a blocked feed, so it's gated to saver hosts and never auto-ignites mid-demo.
isSaver=typeof location!=='undefined'&&(location.search.indexOf('saver')>=0||location.host==='acres.local'||location.protocol==='file:'||location.protocol==='about:');
if(typeof addEventListener==='function'){
  addEventListener('offline',()=>{checkNet();});             // sample immediately (the debounce still gates ignition)
  addEventListener('online',()=>{netFailN=0;netOff=false;}); // network's back → put the fire out now
}
setInterval(checkNet,20000); checkNet();

let last=performance.now();
function frame(ts){
  const dt=Math.max(0,Math.min(0.05,(ts-last)/1000));last=ts; // never negative — a backwards first frame armed the July-4 fireworks on every boot
  update(dt);draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
